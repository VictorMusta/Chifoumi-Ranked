version: '3.8'

services:
  app:
    build: .
    container_name: renfo-app
    restart: always
    ports:
      - "6969:6969"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/renfo
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: renfo-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: renfo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
